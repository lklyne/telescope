name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:mcp-helper
      - run: pnpm build:cli
      - name: Import code signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$CSC_LINK" | base64 -d > $RUNNER_TEMP/certificate.p12

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Add to search list
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
      - run: pnpm exec electron-forge publish
        env:
          CSC_LINK: "1"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      - name: Populate release notes from changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          NOTES=$(mktemp)
          # Extract the section between this version's heading and the next ## [ heading,
          # buffering blank lines so trailing whitespace is trimmed.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found {
              if ($0 ~ /^[[:space:]]*$/) { blanks = blanks "\n"; next }
              if (!started) { started = 1; blanks = "" }
              printf "%s%s\n", blanks, $0
              blanks = ""
            }
          ' changelog.md > "$NOTES"
          if [ ! -s "$NOTES" ]; then
            echo "No changelog section for $VERSION; leaving release notes empty"
            exit 0
          fi
          # Release should exist after publish, but retry briefly in case of eventual consistency
          for i in 1 2 3 4 5; do
            if gh release view "$TAG" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          gh release edit "$TAG" --notes-file "$NOTES"
